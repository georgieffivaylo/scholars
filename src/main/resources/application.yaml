server:
  port: 8085

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: scholars
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  datasource:
    url: jdbc:h2:mem:scholars;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: username
    password: password
  flyway:
    enabled: true
    locations: classpath:/db

logging:
  level:
    org.hibernate.SQL: debug # log SQL statements


